<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card twitter">
            <img src="/atv01-sub/icons/twitter.png" alt="Twitter">
            <h2>TWITTER</h2>

            <p>
                uma rede social que ajuda a vôce comunicar!
            </p>

            <a href="https://twitter.com" target="_blank">
                <button>ACESSAR</button>
            </a>
        </div>

        <div class="card instagram">
            <img src="/atv01-sub/icons/png.intagran.jpg" alt="Instagram">
            <h2>INSTAGRAM</h2>

            <p>
                Umas das redes mais utilizadas!
            </p>

            <a href="https://instagram.com" target="_blank">
                <button>ACESSAR</button>
            </a>
        </div>

        <div class="card youtube">
            <img src="/atv01-sub/icons/png.youtube.png" alt="Youtube">
            <h2>YOUTUBE</h2>

            <p>
                Assista videos gratis!
            </p>

            <a href="https://youtube.com" target="_blank">
                <button>ACESSAR</button>
            </a>
        </div>

    </div>

</body>
</html>
